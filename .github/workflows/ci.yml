name: ci

# Build the NIF and run the host-safe (non-device) test suite on every push/PR.
# Device-backed tests are tagged and excluded by default (test_helper.exs); those
# run privileged in the usb-harness workflow / the in-VM verify flow.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          elixir-version: "1.20"

      - name: Restore deps + build cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix format --check-formatted
      - run: mix credo --strict
      - run: mix test
