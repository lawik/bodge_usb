name: usb-harness

# USB test harness: build the out-of-tree dummy_hcd, then run
# A1..A4 headless and privileged, retaining logs and usbmon traces as artifacts.
#
# Manual dispatch only. Building dummy_hcd out-of-tree needs a kernel that
# exports the gadget/UDC core symbols (usb_add_gadget_udc, usb_gadget_udc_reset,
# usb_gadget_giveback_request, ...); GitHub-hosted runners do NOT (their Azure
# kernel omits them), so the build fails at modpost there regardless of
# linux-modules-extra. Running A1..A4 further needs module loading, configfs,
# raw-gadget and usbmon. Dispatch this onto a self-hosted privileged runner via
# the `runner` input, or run the harness locally in the KVM VM
# (`harness/vm/vm.sh run all`). The per-push host-safe gates live in ci.yml.

on:
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner label (self-hosted, with the USB gadget subsystem)"
        default: "ubuntu-latest"

permissions:
  contents: read

jobs:
  harness:
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build + kernel module deps
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential curl kmod usbutils \
            "linux-headers-$(uname -r)" \
            "linux-modules-extra-$(uname -r)"

      - name: Build harness (dummy_hcd.ko, testusb, a3_device)
        run: make -C harness build

      - name: Preflight (module availability)
        run: |
          set -eux
          for m in raw_gadget g_zero usbtest libcomposite usb_f_acm udc_core usbmon; do
            modinfo "$m" >/dev/null 2>&1 || echo "WARNING: module $m not found on this kernel"
          done

      - name: Run A1..A4
        run: sudo --preserve-env=DUMMY_HCD_REF make -C harness all

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-artifacts
          path: harness/artifacts/**
          if-no-files-found: warn
